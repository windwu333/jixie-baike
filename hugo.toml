baseURL = "https://windwu333.github.io/jixie-baike/"
locale = "zh-CN"
title = "机械师大百科"
theme = "PaperMod"
defaultContentLanguage = "zh"

# Content directory pointing to our articles
contentDir = "content/website"

# Pagination
paginate = 20

enableEmoji = true
hasCJKLanguage = true
canonifyURLs = true
enableRobotsTXT = false

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  env = "production"
  description = "系统化的机械工程知识平台 — Mechanical Engineering Encyclopedia"
  keywords = ["机械工程", "机械设计", "制造工艺", "材料科学", "力学", "热工流体", "机电自动化", "工程知识", "工程师百科"]
  author = "机械师大百科"

  # PaperMod theme config
  ShowShareButtons = true
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowToc = true
  TocOpen = true

  # Favicon / Icons
  # PaperMod assets (icon). Use faviconSVG for SVG favicons
  assetsFavicon = "/favicon.ico"
  assetsFaviconSVG = "/favicon.svg"

  # Home page
  homeInfoParams = { Title = "机械师大百科", Content = "系统化的机械工程知识平台，涵盖机械设计、制造工艺、工程材料、力学强度、热工流体、机电自动化等领域。", Subtitle = "从理论到实践 · 11大专业领域" }

  # Social / SEO
  social = false
  fediverse = "mastodon"
  images = ["/favicon.svg"]

  # PaperMod custom HTML before head closing

[menu]
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 5

  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 10

  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20

  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 25

  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 30

# Baidu Analytics
[services]
  [services.baiduAnalytics]
    id = "UA-XXXXXXXX-X"

# Search (Fuse.js via PaperMod)
[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 2
  keys = ["title", "permalink", "summary", "content"]

[outputs]
  home = ["HTML", "RSS", "JSON"]
