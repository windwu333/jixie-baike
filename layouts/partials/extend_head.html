<style>
.encyclopedia-home {
  max-width: 1100px;
  margin: 0 auto;
  padding: 2rem 1rem;
}
.home-header { text-align: center; margin-bottom: 2.5rem; }
.home-header h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
.home-subtitle { color: var(--secondary); font-size: 1rem; line-height: 1.6; max-width: 600px; margin: 0 auto; }
.home-stats { color: var(--tertiary); font-size: 0.85rem; margin-top: 0.5rem; }
.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
  margin-bottom: 3rem;
}
.category-card {
  display: block;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  text-decoration: none;
  transition: all 0.2s ease;
  background: var(--entry);
}
.category-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}
.category-card-inner { position: relative; }
.category-card h2 { font-size: 1.15rem; margin: 0 0 0.3rem; color: var(--primary); }
.article-count { font-size: 0.8rem; color: var(--secondary); }
.card-arrow {
  position: absolute; right: 0; top: 50%;
  transform: translateY(-50%);
  color: var(--tertiary); font-size: 1.2rem;
  opacity: 0; transition: opacity 0.2s;
}
.category-card:hover .card-arrow { opacity: 1; }
.recent-section h2 { font-size: 1.3rem; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--border); }
.recent-list { display: flex; flex-direction: column; gap: 0.5rem; }
.recent-entry a {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.7rem 1rem; border-radius: 8px; text-decoration: none; transition: background 0.15s;
}
.recent-entry a:hover { background: var(--entry); }
.recent-title { color: var(--primary); font-size: 0.95rem; }
.recent-meta { color: var(--secondary); font-size: 0.8rem; }
@media (max-width: 600px) {
  .category-grid { grid-template-columns: 1fr; }
  .home-header h1 { font-size: 1.6rem; }
}

/* Navbox — Wikipedia-style category navigation */
.navbox {
  margin: 2rem 0;
  border: 1px solid var(--border);
  border-radius: var(--radius, 8px);
  background: var(--entry);
  overflow: hidden;
}
.navbox-title {
  padding: 0.75rem 1rem;
  background: var(--tertiary);
  cursor: pointer;
  font-size: 0.95rem;
  user-select: none;
  list-style: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.navbox-title::-webkit-details-marker { display: none; }
.navbox-title::after {
  content: "▼";
  font-size: 0.75rem;
  color: var(--secondary);
  transition: transform 0.2s;
}
details[open] .navbox-title::after { transform: rotate(180deg); }
.navbox-title:hover { background: var(--border); }
.navbox-body {
  padding: 0.75rem 1rem;
  max-height: 400px;
  overflow-y: auto;
}
.navbox-list {
  columns: 3;
  column-gap: 1.5rem;
  list-style: none;
  padding: 0;
  margin: 0;
}
.navbox-list li {
  break-inside: avoid;
  margin-bottom: 0.35rem;
}
.navbox-link {
  font-size: 0.85rem;
  color: var(--primary);
  text-decoration: none;
  line-height: 1.5;
  display: inline-block;
  padding: 0.1rem 0;
}
.navbox-link:hover { text-decoration: underline; }
@media (max-width: 768px) {
  .navbox-list { columns: 2; }
}
@media (max-width: 480px) {
  .navbox-list { columns: 1; }
}

/* ── Mobile Responsive Overrides ── */
@media (max-width: 768px) {
  .post-content { overflow-x: hidden; }
  .post-content table { display: block; overflow-x: auto; max-width: 100%; }
  .post-content pre { overflow-x: auto; max-width: 100%; white-space: pre-wrap; word-break: break-word; }
  .post-content img { max-width: 100%; height: auto; }
  .post-title { font-size: 1.4rem !important; line-height: 1.3; }
  .breadcrumbs { font-size: 0.8rem; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
  .post-toc { display: none; }
  .toc-open #TableOfContents { display: none; }
}
@media (max-width: 480px) {
  .post-title { font-size: 1.2rem !important; }
  .post-meta { font-size: 0.75rem; }
  .post-tags { gap: 0.25rem; }
  .post-tags li a { font-size: 0.7rem; padding: 0.15rem 0.4rem; }
  .page-header h1 { font-size: 1.3rem; }
  .pagination { font-size: 0.8rem; }
}
/* Search page mobile */
@media (max-width: 600px) {
  .searchbox input { font-size: 0.9rem; padding: 0.6rem; }
  #searchResults { font-size: 0.85rem; }
}
</style>

{{- /* ── JSON-LD Structured Data ── */ -}}

{{- if .IsHome -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "机械师大百科",
  "alternateName": "Mechanical Engineering Encyclopedia",
  "url": "{{ .Site.BaseURL }}",
  "description": "{{ .Site.Params.description }}",
  "inLanguage": "zh-CN",
  "potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": "{{ .Site.BaseURL }}search/?q={search_term_string}"
    },
    "query-input": "required name=search_term_string"
  },
  "author": {
    "@type": "Organization",
    "name": "机械师大百科"
  }
}
</script>
{{- end -}}

{{- if .IsPage -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "TechArticle",
  "headline": "{{ .Title }}",
  "description": "{{ .Description | default .Summary | markdownify | plainify }}",
  "url": "{{ .Permalink }}",
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
  "inLanguage": "zh-CN",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  },
  "publisher": {
    "@type": "Organization",
    "name": "机械师大百科"
  },
  "author": {
    "@type": "Organization",
    "name": "机械师大百科"
  },
  "about": {
    "@type": "Thing",
    "name": "{{ index .Params.categories 0 | default "机械工程" }}"
  },
  "keywords": "{{ delimit .Params.tags ", " }}"
}
</script>
{{- end -}}
