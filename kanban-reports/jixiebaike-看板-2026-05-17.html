<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<title>Claude Kanban Board</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#0b1120;color:#e2e8f0;min-height:100vh;
    opacity:0;animation:fadeIn .4s ease-out forwards
  }
  @keyframes fadeIn{to{opacity:1}}
  @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes countPop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}

  /* ── Header ── */
  .header{
    background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
    padding:18px 32px;border-bottom:1px solid #1e3a5f;
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:100;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)
  }
  .header-left{display:flex;align-items:center;gap:14px}
  .header-icon{width:32px;height:32px;border-radius:8px;
    background:linear-gradient(135deg,#60a5fa,#a78bfa);
    display:flex;align-items:center;justify-content:center;font-size:16px;
    box-shadow:0 0 20px rgba(96,165,250,.25)
  }
  .header h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
  .header h1 span{background:linear-gradient(135deg,#60a5fa,#a78bfa);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .header-right{display:flex;align-items:center;gap:16px;font-size:12px;color:#64748b}
  .live-dot{width:8px;height:8px;border-radius:50%;background:#34d399;
    display:inline-block;animation:pulse 2s infinite;margin-right:6px}
  .live-dot.off{background:#ef4444}
  .countdown{font-variant-numeric:tabular-nums;min-width:28px;display:inline-block;text-align:right}
  .header-total{font-size:11px;color:#475569;padding:2px 8px;border-radius:4px;background:rgba(71,85,105,.15)}

  /* ── Session Tabs ── */
  .session-tabs{
    display:flex;gap:6px;padding:8px 32px;
    background:#0f172a;border-bottom:1px solid #1e3a5f;
    flex-wrap:wrap;align-items:center;
    position:sticky;top:54px;z-index:99;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)
  }
  .session-tab{
    padding:4px 14px;border-radius:6px;font-size:12px;font-weight:500;
    background:transparent;color:#64748b;border:1px solid #1e293b;
    cursor:pointer;transition:all .2s;white-space:nowrap
  }
  .session-tab:hover{background:#1e293b;color:#e2e8f0}
  .session-tab.active{background:#1e3a5f;color:#60a5fa;border-color:#60a5fa}
  .session-tab .tab-count{font-size:10px;color:#475569;margin-left:4px}
  .session-tab.active .tab-count{color:#60a5fa}

  /* ── Stats Bar ── */
  .stats-bar{
    display:flex;gap:12px;padding:14px 32px;
    background:#0f172a;border-bottom:1px solid #1e3a5f;
    flex-wrap:wrap;align-items:center
  }
  .stat{
    padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;
    display:flex;align-items:center;gap:6px;
    border:1px solid transparent;transition:all .2s
  }
  .stat:hover{transform:translateY(-1px)}
  .stat-pending{background:rgba(251,191,36,.1);color:#fbbf24;border-color:rgba(251,191,36,.15)}
  .stat-running{background:rgba(96,165,250,.1);color:#60a5fa;border-color:rgba(96,165,250,.15)}
  .stat-done{background:rgba(52,211,153,.1);color:#34d399;border-color:rgba(52,211,153,.15)}
  .stat-deleted{background:rgba(148,163,184,.1);color:#94a3b8;border-color:rgba(148,163,184,.15)}
  .stat-num{font-size:16px}
  .progress-wrap{flex:1;min-width:120px;display:flex;align-items:center;gap:10px}
  .progress-bar{flex:1;height:6px;background:#1e293b;border-radius:3px;overflow:hidden}
  .progress-fill{
    height:100%;background:linear-gradient(90deg,#60a5fa,#34d399);
    border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1);
    position:relative
  }
  .progress-fill::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
    animation:shimmer 2s infinite
  }
  @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  .progress-text{font-size:13px;font-weight:600;color:#94a3b8;min-width:36px;text-align:right}

  /* ── Board ── */
  .board{
    display:grid;grid-template-columns:repeat(4,1fr);gap:14px;
    padding:20px 32px 40px;min-height:500px
  }

  /* ── Column ── */
  .column{
    background:rgba(15,23,42,.6);border-radius:12px;padding:14px;
    border:1px solid #1e293b;min-height:200px;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    display:flex;flex-direction:column
  }
  .column-header{
    font-size:13px;font-weight:600;margin-bottom:10px;
    padding-bottom:10px;border-bottom:2px solid #1e293b;
    display:flex;justify-content:space-between;align-items:center;
    flex-shrink:0
  }
  .column-pending .column-header{border-color:#fbbf24}
  .column-in_progress .column-header{border-color:#60a5fa}
  .column-completed .column-header{border-color:#34d399}
  .column-deleted .column-header{border-color:#64748b}
  .col-label{display:flex;align-items:center;gap:6px}
  .col-icon{font-size:15px}
  .count-badge{
    font-size:11px;font-weight:600;padding:2px 10px;border-radius:12px;
    background:#1e293b;color:#94a3b8;transition:all .3s
  }
  .count-badge.pop{animation:countPop .3s ease}
  .cards-wrap{flex:1;overflow-y:auto;min-height:60px}
  .cards-wrap::-webkit-scrollbar{width:4px}
  .cards-wrap::-webkit-scrollbar-track{background:transparent}
  .cards-wrap::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}

  /* ── Card ── */
  .card{
    background:linear-gradient(135deg,#0f172a 0%,#131c31 100%);
    border-radius:10px;padding:12px 14px;margin-bottom:8px;
    border:1px solid #1e293b;
    transition:all .25s cubic-bezier(.4,0,.2,1);
    cursor:default;position:relative;overflow:hidden;
    animation:slideUp .35s ease both
  }
  .card::before{
    content:'';position:absolute;top:0;left:0;width:3px;height:100%;
    border-radius:0 2px 2px 0;transition:all .25s
  }
  .card-status-pending::before{background:#fbbf24;box-shadow:0 0 8px rgba(251,191,36,.3)}
  .card-status-in_progress::before{background:#60a5fa;box-shadow:0 0 8px rgba(96,165,250,.3)}
  .card-status-completed::before{background:#34d399;box-shadow:0 0 8px rgba(52,211,153,.3)}
  .card-status-deleted::before{background:#64748b}
  .card:hover{
    transform:translateY(-2px);border-color:#334155;
    box-shadow:0 8px 24px rgba(0,0,0,.3)
  }
  .card-top{display:flex;align-items:center;gap:6px;margin-bottom:6px}
  .card-order{
    font-size:10px;font-weight:700;color:#60a5fa;white-space:nowrap;
    padding:0 6px;border-radius:3px;background:rgba(96,165,250,.1);
    display:inline-flex;align-items:center;height:18px
  }
  .card-id{
    font-size:10px;font-weight:600;color:#64748b;text-transform:uppercase;
    letter-spacing:.5px;padding:1px 6px;border-radius:3px;background:rgba(100,116,139,.12);
    display:inline-flex;align-items:center;height:18px
  }
  .card-session{
    font-size:9px;color:#475569;margin-left:auto;
    padding:0 5px;border-radius:2px;background:rgba(71,85,105,.15);
    display:inline-flex;align-items:center;height:16px;white-space:nowrap
  }
  .card-title{font-size:13px;font-weight:500;color:#f1f5f9;line-height:1.4;margin-bottom:4px}
  .card-desc{font-size:12px;color:#64748b;line-height:1.4;margin-top:4px}
  .card-blocked{
    font-size:11px;color:#f87171;margin-top:6px;
    padding:4px 8px;background:rgba(248,113,113,.08);border-radius:4px;
    display:inline-block
  }
  .card-progress{
    font-size:10px;color:#64748b;margin-top:4px;
    padding:2px 6px;background:rgba(100,116,139,.08);border-radius:3px;
    display:inline-block
  }
  .card-time{font-size:10px;color:#475569;margin-top:6px}
  .empty-col{
    display:flex;align-items:center;justify-content:center;
    height:80px;color:#334155;font-size:12px;font-style:italic
  }
  .card:nth-child(1){animation-delay:0s}
  .card:nth-child(2){animation-delay:.04s}
  .card:nth-child(3){animation-delay:.08s}
  .card:nth-child(4){animation-delay:.12s}
  .card:nth-child(5){animation-delay:.16s}
  .card:nth-child(6){animation-delay:.2s}
  .card:nth-child(7){animation-delay:.24s}
  .card:nth-child(8){animation-delay:.28s}
  .card:nth-child(9){animation-delay:.32s}
  .card:nth-child(10){animation-delay:.36s}

  /* ── Toast ── */
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    padding:8px 16px;border-radius:8px;font-size:12px;font-weight:500;
    background:#1e293b;color:#94a3b8;border:1px solid #334155;
    opacity:0;transition:opacity .3s;z-index:200;pointer-events:none;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)
  }
  .toast.show{opacity:1}

  /* ── Responsive ── */
  @media(max-width:1100px){.board{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:600px){.board{grid-template-columns:1fr;padding:12px}
    .header{padding:14px 16px;flex-direction:column;gap:8px;text-align:center}
    .stats-bar{padding:10px 16px}
    .session-tabs{padding:6px 16px;top:96px}
  }
</style>
</head>

": "T1", "subject": "更新INDEX.md索引", "status": "pending", "description": "手动运行update_index.py --force重建技能索引，确认2个新skill被收录", "created_at": "2026-05-17T01:52:18.607105", "updated_at": "2026-05-17T11:13:43.563503", "session": "jixiebaike"}, {"id": "T2", "subject": "最终验证结晶管线完整性", "status": "pending", "description": "验证crystallization_log.json、pending队列、skill文件完整性", "created_at": "2026-05-17T01:52:19.311436", "updated_at": "2026-05-17T11:13:43.563503", "session": "jixiebaike"}];
window.__GEN_TIME__ = "2026-05-17 11:15";
window.__SESSION_FILTER__ = "jixiebaike";
window.__ALL_SESSIONS__ = ["default", "cron-audit", "jixiebaike", "test-session", "verify-session"];

// ── Column config ──
var COLUMNS = [
  {key:"pending",    icon:"📋", label:"待办",     cls:"column-pending"},
  {key:"in_progress",icon:"🔄", label:"进行中",  cls:"column-in_progress"},
  {key:"completed",  icon:"✅", label:"已完成",   cls:"column-completed"},
  {key:"deleted",    icon:"❌", label:"已取消",   cls:"column-deleted"},
];

function statusClass(s) {
  return "card-status-" + (s || "pending");
}

function renderCard(t, taskStatus, sessionFilter) {
  var tid = t.id || t.taskId || "?";
  var subj = t.subject || t.content || "?";
  var desc = t.description || t.body || "";
  var blocked = (t.blockedBy || []).filter(function(b) {
    return !taskStatus || taskStatus[b] !== "completed";
  });
  var created = t.created_at ? t.created_at.slice(0,10) : "";
  var order = (t.order !== undefined && t.order !== null) ? t.order : null;
  var session = t.session || "default";

  var html = '<div class="card ' + statusClass(t.status) + '">';
  html += '<div class="card-top">';
  if (order !== null) {
    html += '<div class="card-order">#' + order + '</div>';
  }
  html += '<div class="card-id">' + tid + '</div>';
  // Show session badge only when filtering by a specific session (show others)
  if (sessionFilter && session !== sessionFilter) {
    html += '<div class="card-session">' + session + '</div>';
  } else if (session && sessionFilter === "") {
    // Only show session badge when in "All" view or when switching tabs
  }
  html += '</div>';
  html += '<div class="card-title">' + subj + '</div>';
  if (desc) html += '<div class="card-desc">' + desc.slice(0,120) + '</div>';

  // Execution progress: step X / total in session
  if (order !== null && sessionFilter) {
    // Count total tasks in this session (from all data)
    var sessionTotal = 0;
    window.__KANBAN_DATA__.forEach(function(x) {
      if ((x.session || "default") === sessionFilter) sessionTotal++;
    });
    if (sessionTotal > 1) {
      html += '<div class="card-progress">&#128260; 步骤 ' + order + ' / ' + sessionTotal + '</div>';
    }
  }

  if (blocked.length) html += '<div class="card-blocked">⛔ 阻塞: ' + blocked.join(", ") + '</div>';
  if (created) html += '<div class="card-time">' + created + '</div>';
  html += '</div>';
  return html;
}

function renderBoard(data) {
  // Apply session filter
  var sessionFilter = window.__SESSION_FILTER__ || "";
  var filtered = sessionFilter
    ? data.filter(function(t) { return (t.session || "default") === sessionFilter; })
    : data.slice(0);

  var taskStatus = {};
  data.forEach(function(t) { if (t.id) taskStatus[t.id] = t.status; });

  var total = filtered.length;
  var counts = {};
  COLUMNS.forEach(function(c) { counts[c.key] = 0; });
  filtered.forEach(function(t) { var s = t.status || "pending"; counts[s] = (counts[s]||0) + 1; });
  var done = counts["completed"] || 0;
  var pct = total ? Math.round(done / total * 100) : 0;

  // Update stats
  document.getElementById("countPending").textContent = counts["pending"] || 0;
  document.getElementById("countRunning").textContent = counts["in_progress"] || 0;
  document.getElementById("countDone").textContent = counts["completed"] || 0;
  document.getElementById("countDeleted").textContent = counts["deleted"] || 0;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressText").textContent = pct + "%";
  document.getElementById("headerTotal").textContent = (sessionFilter ? data.length + " total, " + total + " shown" : total + " tasks");

  // Render columns with order-sorted cards
  var board = document.getElementById("board");
  board.innerHTML = "";
  COLUMNS.forEach(function(col) {
    var cards = filtered.filter(function(t) { return (t.status || "pending") === col.key; });
    // Sort by order ascending (tasks without order go to end)
    cards.sort(function(a, b) {
      var oa = (a.order !== undefined && a.order !== null) ? a.order : 9999;
      var ob = (b.order !== undefined && b.order !== null) ? b.order : 9999;
      if (oa !== ob) return oa - ob;
      // Tie-break by created_at or id
      var ca = a.created_at || a.id || "";
      var cb = b.created_at || b.id || "";
      return ca < cb ? -1 : ca > cb ? 1 : 0;
    });
    var div = document.createElement("div");
    div.className = "column " + col.cls;
    div.innerHTML =
      '<div class="column-header">' +
      '<span class="col-label"><span class="col-icon">' + col.icon + '</span>' + col.label + '</span>' +
      '<span class="count-badge">' + cards.length + '</span></div>' +
      '<div class="cards-wrap">' +
      (cards.length
        ? cards.map(function(t) { return renderCard(t, taskStatus, sessionFilter); }).join("")
        : '<div class="empty-col">— 空 —</div>') +
      '</div>';
    board.appendChild(div);
  });
}

function renderSessionTabs() {
  var container = document.getElementById("sessionTabs");
  if (!container) return;
  var sessions = window.__ALL_SESSIONS__ || [];
  var current = window.__SESSION_FILTER__ || "";
  if (!current) current = "";

  // Count tasks per session (from full data)
  var sessionCounts = {};
  (window.__KANBAN_DATA__ || []).forEach(function(t) {
    var s = t.session || "default";
    sessionCounts[s] = (sessionCounts[s] || 0) + 1;
  });

  var html = '<button class="session-tab' + (current === "" ? " active" : "") +
    '" data-session="" onclick="onSessionChange('')">All</button>';
  sessions.forEach(function(s) {
    var count = sessionCounts[s] || 0;
    var active = (current === s) ? " active" : "";
    html += '<button class="session-tab' + active + '" data-session="' + s.replace(/"/g,"&quot;") +
      '" onclick="onSessionChange('' + s.replace(/'/g,"\'") + '')">' + s +
      ' <span class="tab-count">(' + count + ')</span></button>';
  });
  container.innerHTML = html;
}

function onSessionChange(sessionName) {
  window.__SESSION_FILTER__ = sessionName;
  renderSessionTabs();
  renderBoard(window.__KANBAN_DATA__);
  showToast("&#8635; 已切换: " + (sessionName || "全部会话"));
}

// ── Toast notification ──
var toastTimer = null;
function showToast(msg) {
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove("show"); }, 2500);
}

// ── Countdown ──
var countdownVal = 30;
var countdownEl = document.getElementById("countdown");
function updateCountdown() {
  countdownVal--;
  if (countdownVal < 0) countdownVal = 0;
  countdownEl.textContent = countdownVal;
}

// ── AJAX polling (live updates without meta refresh) ──
function pollData() {
  var url = "kanban-data.json?_=" + Date.now();
  var xhr = new XMLHttpRequest();
  xhr.open("GET", url, true);
  xhr.timeout = 5000;
  xhr.onload = function() {
    if (xhr.status === 200 || xhr.status === 0) {
      try {
        var fresh = JSON.parse(xhr.responseText);
        if (JSON.stringify(fresh) !== JSON.stringify(window.__KANBAN_DATA__)) {
          window.__KANBAN_DATA__ = fresh;
          renderSessionTabs();
          renderBoard(fresh);
          showToast("&#8635; 数据已自动更新");
          document.getElementById("liveDot").className = "live-dot";
          document.getElementById("liveLabel").textContent = "Live";
        }
      } catch(e) {}
    }
  };
  xhr.onerror = function() {
    // AJAX failed (likely file:// CORS) — fall back to meta refresh
    document.getElementById("liveDot").className = "live-dot off";
    document.getElementById("liveLabel").textContent = "Fallback";
    if (countdownVal <= 0) {
      // Save scroll position and reload
      try { sessionStorage.setItem("kanbanScroll", window.scrollY); } catch(e) {}
      location.reload();
    }
  };
  xhr.send();
}

// ── Init ──
renderSessionTabs();
renderBoard(window.__KANBAN_DATA__);

// Restore scroll position after meta refresh
try {
  var saved = sessionStorage.getItem("kanbanScroll");
  if (saved) { window.scrollTo(0, parseInt(saved, 10)); sessionStorage.removeItem("kanbanScroll"); }
} catch(e) {}

// Poll interval — every second: update countdown, poll only on 0
setInterval(function() {
  updateCountdown();
  if (countdownVal <= 0) {
    pollData();
    countdownVal = 30;
    document.getElementById("genTime").textContent = new Date().toLocaleString("zh-CN", {
      year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"
    });
  }
}, 1000);

// Also try on tab focus
document.addEventListener("visibilitychange", function() {
  if (!document.hidden) { countdownVal = 0; }
});
</script>
